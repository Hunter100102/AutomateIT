<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Smart Data Analyzer</title>
  <style>
    body { font-family: Arial; padding: 20px; max-width: 900px; margin: auto; }
    input, button { width: 100%; margin-top: 10px; padding: 10px; }
    .loader {
      display: none;
      border: 6px solid #f3f3f3;
      border-top: 6px solid #3498db;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .expense-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    .expense-table th, .expense-table td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: left;
    }
    .expense-table th {
      background-color: #f4f4f4;
    }
  </style>
</head>
<body>
  <h1>📊 Smart Data Analyzer</h1>
  <p>Upload a CSV or Excel file. This tool will analyze it, show charts, and give insights automatically.</p>

  <form id="upload-form" enctype="multipart/form-data">
    <input type="file" name="datafile" accept=".csv,.xlsx" required />
    <button type="submit">Analyze</button>
  </form>

  <div class="loader" id="loader"></div>

  <h3>Insights:</h3>
  <pre id="results"></pre>

  <h3>Table:</h3>
  <div id="table-area"></div>

  <h3>Chart:</h3>
  <div id="chart-area"></div>

  <script>
    const form = document.getElementById("upload-form");
    const loader = document.getElementById("loader");
    const results = document.getElementById("results");
    const chartArea = document.getElementById("chart-area");
    const tableArea = document.getElementById("table-area");

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      const formData = new FormData(this);

      loader.style.display = "block";
      results.textContent = "";
      chartArea.innerHTML = "";
      tableArea.innerHTML = "";

      fetch("https://automateit.onrender.com/api/analyze-data", {
        method: "POST",
        body: formData
      })
      .then(res => res.json())
      .then(data => {
        loader.style.display = "none";
        results.textContent = data.insights;
        chartArea.innerHTML = `<img src="data:image/png;base64,${data.chart}" alt="Chart" />`;
        tableArea.innerHTML = data.table;
      })
      .catch(err => {
        loader.style.display = "none";
        results.textContent = "An error occurred during analysis.";
        console.error(err);
      });
    });
  </script>
</body>
</html>
