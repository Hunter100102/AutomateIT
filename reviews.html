<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AutomateIT — Customer Reviews</title>
  <link rel="stylesheet" href="assets/css/reviews.css">
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div>
        <div class="brand">AutomateIT — Customer Reviews</div>
        <div class="small">Reviews are loaded securely from your Render backend (no API keys in the browser).</div>
      </div>
      <div class="rating-line">
        <span id="avg" class="chip">Average: —</span>
        <span id="total" class="chip">Reviews: —</span>
      </div>
    </header>

    <div class="controls">
      <input id="placeIdInput" type="text" placeholder="Place ID (paste or prefill)" />
      <button id="load">Load</button>
      <button id="sort-newest">Newest</button>
      <button id="sort-highest">Highest Rated</button>
      <button id="sort-lowest">Lowest Rated</button>
    </div>

    <div id="cards" class="cards" role="region" aria-live="polite"></div>

    <div class="warning" id="api-note" style="display:none">
      Google’s Place Details API typically returns up to 5 recent reviews.
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/reviews-client.js"></script>
</body>
</html>
