<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KnC Automations | Coming Soon</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #282828, #1a1a1a);
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: #f9d342;
        }

        p {
            font-size: 1.2rem;
            color: #ddd;
            margin-bottom: 25px;
        }

        .tagline {
            font-size: 0.95rem;
            color: #aaa;
            margin-top: 20px;
        }

        .loader {
            margin: 20px auto;
            border: 4px solid #444;
            border-top: 4px solid #f9d342;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            p {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>We’re Working on Something Great 🚧</h1>
        <p>Sorry for the inconvenience. Our website is currently under construction, but we’ll be back soon.</p>

        <div class="loader"></div>

        <p class="tagline">KnC Automations — Make IT work for you.</p>
    </div>
</body>
</html>
