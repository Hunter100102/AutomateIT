<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | AutomateIT</title>
    <style>
        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background: url('images/homepage background.jpg') no-repeat center center/cover;
            color: #000; /* Black text color */
        }

        header {
            background: #000; /* Black background */
            color: #fff; /* White text color */
            padding: 1rem 0;
            text-align: center;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        nav ul li {
            display: inline;
            margin: 0 10px;
        }

        nav ul li a {
            color: #fff; /* White text color */
            text-decoration: none;
            font-weight: bold;
        }

        .hero {
            background: rgba(255, 255, 255, 0.75); /* Semi-transparent white background */
            padding: 35px 20px;
            text-align: center;
            color: #000; /* Black text color */
            position: relative; /* Add position relative to the hero section */
        }

        .hero h1 {
            font-size: 2.5rem;
            margin: 0;
        }

        .hero p {
            font-size: 1.2rem;
        }

        .hero .logo {
            position: absolute; /* Position the logo */
            top: 50%; /* Vertically center the logo */
            right: 20px; /* Position the logo 20px from the right */
            transform: translateY(-50%); /* Adjust the vertical centering */
        }

        .hero .logo img {
            height: 150px; /* Adjust the height as needed */
            width: auto; /* Maintain aspect ratio */
        }

        .cta {
            background: #00aaff;
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
            display: inline-block;
        }

        section {
            padding: 60px 20px;
        }

        footer {
            background: #000; /* Black background */
            color: #fff; /* White text color */
            text-align: center;
            padding: 1rem 0;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        h1, h2 {
            color: #000; /* Black text color */
        }

        /* Responsive Styles */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }

            .hero p {
                font-size: 1rem;
            }

            .hero .logo {
                position: static;
                transform: none;
                margin-top: 20px;
            }

            .hero .logo img {
                height: 80px;
            }

            nav ul li {
                display: block;
                margin: 10px 0;
            }

            footer {
                position: static;
                margin-top: 20px;
            }
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 1.5rem;
            }

            .hero p {
                font-size: 0.9rem;
            }

            .hero .logo img {
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <section class="hero">
        <h1>Welcome to AutomateIT</h1>
        <p>Custom Automation Solutions for Your Business</p>
        <div class="logo">
            <img src="images/logo.png" alt="AutomateIT Logo">
        </div>
    </section>
    <footer>
        <p>&copy; 2024 AutomateIT. All rights reserved.</p>
    </footer>
</body>
</html>
