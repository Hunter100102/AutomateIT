<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | AutomateIT</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background: url('images/homepage background-2.jpg') no-repeat center center;
            background-size: cover; /* Ensure the background covers the entire screen */
            min-height: 100vh; /* Ensure the body takes at least the full height of the viewport */
            color: #333; /* Dark grey text color */
        }

        header {
            background: rgba(0, 0, 0, 0.8); /* Semi-transparent black background */
            color: #fff; /* White text color */
            padding: 1rem 0;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        nav ul li {
            margin: 0 15px;
        }

        nav ul li a {
            color: #fff; /* White text color */
            text-decoration: none;
            font-weight: bold;
            padding: 10px 15px;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

        nav ul li a:hover {
            background: #00aaff; /* Light blue background on hover */
        }

        .hero {
            background: rgba(255, 255, 255, 0.75); /* Semi-transparent white background with glassmorphism effect */
            padding: 50px 20px;
            text-align: center;
            color: #333; /* Dark grey text color */
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            max-width: 900px;
            margin: 100px auto; /* Center the hero section and add space above */
        }

        .hero h1 {
            font-size: 3rem;
            margin: 0;
        }

        .hero p {
            font-size: 1.2rem;
            margin: 20px 0;
        }

        .cta {
            background: #00aaff;
            color: #fff;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 30px;
            display: inline-block;
            font-size: 1rem;
            transition: background 0.3s ease;
        }

        .cta:hover {
            background: #0088cc; /* Darker blue on hover */
        }

        footer {
            background: rgba(0, 0, 0, 0.8); /* Semi-transparent black background */
            color: #fff; /* White text color */
            text-align: center;
            padding: 1rem 0;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        /* Responsive Styles */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }

            .hero p {
                font-size: 1rem;
            }

            nav ul {
                flex-direction: column;
            }

            nav ul li {
                margin: 10px 0;
            }
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 2rem;
            }

            .hero p {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <section class="hero">
        <h1>Welcome to AutomateIT</h1>
        <p>Custom Automation Solutions for Your Business</p>
        <a href="contact.html" class="cta">Free Consultation</a>
    </section>
    <footer>
        <p>&copy; 2024 AutomateIT. All rights reserved.</p>
    </footer>
</body>
</html>
