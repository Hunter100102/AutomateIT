    <div class="container">
      <h1>Contact Us</h1>
      <form id="contactForm">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required />

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required />

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit">Send</button>
      </form>
      <div id="statusMessage"></div>
      <div class="contact-info">
        <p>
          <strong>Phone:</strong> <a href="tel:+16782627635">(678) 262-7635</a>

    <script>
      document
        .getElementById("contactForm")
        .addEventListener("submit", async function (event) {
          event.preventDefault();

          const formData = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            message: document.getElementById("message").value,
          };

          const response = await fetch(
            "https://sendgrid-7-14-2024-b12a107e1f2c.herokuapp.com/send-email",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify(formData),
            }
          );

          const statusMessage = document.getElementById("statusMessage");

          if (response.ok) {
            statusMessage.innerText = "Email sent successfully!";
            statusMessage.style.color = "green";

            window.location.href = "recieved.html";
          } else {
            statusMessage.innerText = "Failed to send email.";
            statusMessage.style.color = "red";
          }
        });
    </script>
